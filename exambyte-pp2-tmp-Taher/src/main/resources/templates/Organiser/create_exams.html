<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Exams page</title>
    <link rel="stylesheet" href="/StyleSheet.css">
</head>
<body>
<div class="navbar">
    <a href="/Organiser_dashboard">Organiser Dashboard</a>
    <a href="/create_exams">Create Exams</a>
    <a href="/old_exams">Old Exams</a>
    <a href ="/logout">Logout</a>
</div>
<div class="content">
    <h1>Here you can create a test, <span th:text="${name}"> </span> </h1>
</div>

<form th:action="@{/Organiser/step1}" method="post">
    <label for="textQuestions">Number of Text Questions:</label>
    <input type="number" id="textQuestions" name="numberOfTextQuestions" min="0" required>

    <label for="mcQuestions">Number of Multiple-Choice Questions:</label>
    <input type="number" id="mcQuestions" name="numberOfMultipleChoiceQuestions" min="0" required>

    <button type="submit">Next</button>
</form>

</body>
</html>
